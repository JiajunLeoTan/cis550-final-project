<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Axiom database ER diagram</title>
  <desc id="desc">Entity relationship diagram for Categories, Brands, Products, Users, and Reviews with primary keys, foreign keys, and one-to-many cardinalities.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#425466"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .table { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .header { fill: #1f2937; }
      .header-text { fill: #ffffff; font: 700 20px Arial, sans-serif; }
      .field { fill: #111827; font: 15px Arial, sans-serif; }
      .pk { fill: #0f766e; font-weight: 700; }
      .fk { fill: #7c3aed; font-weight: 700; }
      .line { stroke: #425466; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { fill: #111827; font: 700 15px Arial, sans-serif; }
      .note { fill: #475569; font: 14px Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="820"/>
  <text x="640" y="48" text-anchor="middle" fill="#111827" font-family="Arial, sans-serif" font-size="30" font-weight="700">Axiom Shopping Assistant ER Diagram</text>
  <text x="640" y="76" text-anchor="middle" class="note">Five normalized relations with product, category, brand, user, and review links</text>

  <g transform="translate(70 150)">
    <rect class="table" width="270" height="160"/>
    <rect class="header" width="270" height="42" rx="8"/>
    <text class="header-text" x="18" y="28">Categories</text>
    <text class="field pk" x="18" y="72">PK category_id</text>
    <text class="field" x="18" y="102">category_name UNIQUE</text>
  </g>

  <g transform="translate(70 510)">
    <rect class="table" width="270" height="150"/>
    <rect class="header" width="270" height="42" rx="8"/>
    <text class="header-text" x="18" y="28">Brands</text>
    <text class="field pk" x="18" y="72">PK brand_id</text>
    <text class="field" x="18" y="102">brand_name UNIQUE</text>
  </g>

  <g transform="translate(505 170)">
    <rect class="table" width="300" height="330"/>
    <rect class="header" width="300" height="42" rx="8"/>
    <text class="header-text" x="18" y="28">Products</text>
    <text class="field pk" x="18" y="72">PK asin</text>
    <text class="field" x="18" y="102">title</text>
    <text class="field" x="18" y="132">img_url</text>
    <text class="field" x="18" y="162">product_url</text>
    <text class="field" x="18" y="192">price, list_price</text>
    <text class="field" x="18" y="222">stars, review_count</text>
    <text class="field" x="18" y="252">is_best_seller</text>
    <text class="field fk" x="18" y="282">FK category_id</text>
    <text class="field fk" x="18" y="312">FK brand_id</text>
  </g>

  <g transform="translate(935 125)">
    <rect class="table" width="270" height="120"/>
    <rect class="header" width="270" height="42" rx="8"/>
    <text class="header-text" x="18" y="28">Users</text>
    <text class="field pk" x="18" y="72">PK user_id</text>
  </g>

  <g transform="translate(910 390)">
    <rect class="table" width="300" height="285"/>
    <rect class="header" width="300" height="42" rx="8"/>
    <text class="header-text" x="18" y="28">Reviews</text>
    <text class="field pk" x="18" y="72">PK review_id</text>
    <text class="field fk" x="18" y="102">FK asin</text>
    <text class="field fk" x="18" y="132">FK user_id</text>
    <text class="field" x="18" y="162">rating</text>
    <text class="field" x="18" y="192">review_title</text>
    <text class="field" x="18" y="222">review_text</text>
    <text class="field" x="18" y="252">helpful_vote, verified_purchase</text>
    <text class="field" x="18" y="282">review_timestamp</text>
  </g>

  <path class="line" d="M 340 230 C 410 230, 435 255, 505 255"/>
  <text class="label" x="375" y="212">1</text>
  <text class="label" x="478" y="238">N</text>
  <text class="note" x="375" y="260">category has products</text>

  <path class="line" d="M 340 585 C 430 585, 435 410, 505 410"/>
  <text class="label" x="375" y="604">1</text>
  <text class="label" x="478" y="430">N</text>
  <text class="note" x="354" y="552">brand has products</text>

  <path class="line" d="M 805 445 C 845 445, 865 500, 910 500"/>
  <text class="label" x="822" y="426">1</text>
  <text class="label" x="884" y="485">N</text>
  <text class="note" x="820" y="466">product has reviews</text>

  <path class="line" d="M 1070 245 C 1070 305, 1060 335, 1060 390"/>
  <text class="label" x="1086" y="282">1</text>
  <text class="label" x="1074" y="370">N</text>
  <text class="note" x="1088" y="330">user writes reviews</text>
</svg>
