<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-labelledby="title desc">
  <title id="title">Axiom database ER diagram</title>
  <desc id="desc">Entity relationship diagram for the five normalized base tables: Categories, Brands, Products, Users, and Reviews. It shows primary keys, foreign keys, row counts, and one-to-many relationships. Materialized views are noted as derived optimization structures.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .header { fill: #1f2937; }
      .header-text { fill: #ffffff; font: 700 21px Arial, sans-serif; }
      .row-count { fill: #d1d5db; font: 13px Arial, sans-serif; }
      .field { fill: #111827; font: 16px Arial, sans-serif; }
      .subtle { fill: #475569; font: 14px Arial, sans-serif; }
      .pk { fill: #0f766e; font-weight: 700; }
      .fk { fill: #6d28d9; font-weight: 700; }
      .optional { fill: #92400e; font-weight: 700; }
      .rel { stroke: #334155; stroke-width: 2.5; fill: none; }
      .rel-label { fill: #111827; font: 700 16px Arial, sans-serif; }
      .rel-note { fill: #334155; font: 14px Arial, sans-serif; }
      .legend { fill: #eef2f7; stroke: #cbd5e1; stroke-width: 1.5; }
      .title { fill: #111827; font: 700 32px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text id="diagram-title" class="title" x="750" y="58" text-anchor="middle">Axiom Shopping Assistant ER Diagram</text>
  <text class="subtle" x="750" y="90" text-anchor="middle">Normalized base schema loaded from cleaned Amazon product, category, brand, user, and review data</text>

  <!-- Categories -->
  <g id="categories" transform="translate(80 155)">
    <rect class="card" width="330" height="175" rx="10"/>
    <rect class="header" width="330" height="50" rx="10"/>
    <text class="header-text" x="18" y="31">Categories</text>
    <text class="row-count" x="312" y="31" text-anchor="end">248 rows</text>
    <text class="field pk" x="20" y="82">PK category_id integer</text>
    <text class="field" x="20" y="115">category_name varchar(255)</text>
    <text class="subtle" x="20" y="145">UNIQUE, NOT NULL</text>
  </g>

  <!-- Brands -->
  <g id="brands" transform="translate(80 610)">
    <rect class="card" width="330" height="175" rx="10"/>
    <rect class="header" width="330" height="50" rx="10"/>
    <text class="header-text" x="18" y="31">Brands</text>
    <text class="row-count" x="312" y="31" text-anchor="end">26,484 rows</text>
    <text class="field pk" x="20" y="82">PK brand_id integer</text>
    <text class="field" x="20" y="115">brand_name varchar(255)</text>
    <text class="subtle" x="20" y="145">UNIQUE, NOT NULL</text>
  </g>

  <!-- Products -->
  <g id="products" transform="translate(550 170)">
    <rect class="card" width="410" height="430" rx="10"/>
    <rect class="header" width="410" height="50" rx="10"/>
    <text class="header-text" x="18" y="31">Products</text>
    <text class="row-count" x="392" y="31" text-anchor="end">1,426,336 rows</text>
    <text class="field pk" x="22" y="82">PK asin varchar(20)</text>
    <text class="field" x="22" y="113">title varchar(1024)</text>
    <text class="field" x="22" y="144">img_url text</text>
    <text class="field" x="22" y="175">product_url text</text>
    <text class="field" x="22" y="206">price decimal(10,2)</text>
    <text class="field" x="22" y="237">list_price decimal(10,2)</text>
    <text class="field" x="22" y="268">stars decimal(2,1)</text>
    <text class="field" x="22" y="299">review_count integer default 0</text>
    <text class="field" x="22" y="330">is_best_seller boolean default false</text>
    <text class="field fk" x="22" y="361">FK category_id -> Categories</text>
    <text class="field fk optional" x="22" y="392">FK brand_id -> Brands nullable</text>
  </g>

  <!-- Users -->
  <g id="users" transform="translate(1080 155)">
    <rect class="card" width="340" height="145" rx="10"/>
    <rect class="header" width="340" height="50" rx="10"/>
    <text class="header-text" x="18" y="31">Users</text>
    <text class="row-count" x="322" y="31" text-anchor="end">1,279,603 rows</text>
    <text class="field pk" x="20" y="86">PK user_id varchar(128)</text>
  </g>

  <!-- Reviews -->
  <g id="reviews" transform="translate(1040 430)">
    <rect class="card" width="390" height="370" rx="10"/>
    <rect class="header" width="390" height="50" rx="10"/>
    <text class="header-text" x="18" y="31">Reviews</text>
    <text class="row-count" x="372" y="31" text-anchor="end">2,998,677 rows</text>
    <text class="field pk" x="22" y="82">PK review_id integer</text>
    <text class="field fk" x="22" y="113">FK asin -> Products NOT NULL</text>
    <text class="field fk" x="22" y="144">FK user_id -> Users NOT NULL</text>
    <text class="field" x="22" y="175">rating decimal(2,1) NOT NULL</text>
    <text class="field" x="22" y="206">review_title varchar(1024)</text>
    <text class="field" x="22" y="237">review_text text</text>
    <text class="field" x="22" y="268">helpful_vote integer default 0</text>
    <text class="field" x="22" y="299">verified_purchase boolean default false</text>
    <text class="field" x="22" y="330">review_timestamp timestamp</text>
  </g>

  <!-- Relationships -->
  <path class="rel" d="M 410 240 H 485 V 525 H 550"/>
  <text class="rel-label" x="430" y="224">1</text>
  <text class="rel-label" x="502" y="510">0..N</text>
  <text class="rel-note" x="430" y="268">category contains</text>
  <text class="rel-note" x="430" y="286">products</text>

  <path class="rel" d="M 410 698 H 485 V 563 H 550"/>
  <text class="rel-label" x="430" y="720">1</text>
  <text class="rel-label" x="502" y="586">0..N</text>
  <text class="rel-note" x="430" y="638">brand labels</text>
  <text class="rel-note" x="430" y="656">products</text>
  <text class="rel-note" x="430" y="674">(brand optional)</text>

  <path class="rel" d="M 960 285 H 1000 V 543 H 1040"/>
  <text class="rel-label" x="975" y="269">1</text>
  <text class="rel-label" x="995" y="528">0..N</text>
  <text class="rel-note" x="1012" y="335">product has reviews</text>

  <path class="rel" d="M 1250 300 L 1250 430"/>
  <text class="rel-label" x="1268" y="328">1</text>
  <text class="rel-label" x="1268" y="414">0..N</text>
  <text class="rel-note" x="1276" y="374">user writes reviews</text>

  <!-- Derived structures / legend -->
  <g id="legend" transform="translate(345 860)">
    <rect class="legend" width="810" height="78" rx="10"/>
    <text class="field pk" x="22" y="31">PK</text>
    <text class="subtle" x="52" y="31">primary key</text>
    <text class="field fk" x="170" y="31">FK</text>
    <text class="subtle" x="200" y="31">foreign key</text>
    <text class="field optional" x="320" y="31">nullable</text>
    <text class="subtle" x="400" y="31">optional relationship in schema</text>
    <text class="subtle" x="22" y="58">Derived optimization read models, not base ER entities: mv_category_compare, mv_brand_performance, mv_value_score_components.</text>
  </g>
</svg>
